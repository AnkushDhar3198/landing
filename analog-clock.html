<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realistic Analog Clock</title>
  <style>
    :root {
      --dial-size: min(72vmin, 430px);
      --bg-top: #d8dee6;
      --bg-bottom: #aeb8c4;
      --metal-light: #f5f7fa;
      --metal-mid: #c7cdd6;
      --metal-dark: #8f98a3;
      --accent: #c62828;
      --text: #20252b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 40%),
        radial-gradient(circle at 80% 75%, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0) 50%),
        linear-gradient(155deg, var(--bg-top), var(--bg-bottom));
    }

    .clock {
      width: var(--dial-size);
      height: var(--dial-size);
      position: relative;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 70% 72%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 42%),
        radial-gradient(circle at center, #fbfcfd 0%, #edf1f5 47%, #dbe2ea 100%);
      border: 11px solid transparent;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.65),
        inset 0 0 0 11px rgba(96, 106, 116, 0.14),
        inset 0 16px 26px rgba(255, 255, 255, 0.7),
        inset 0 -14px 26px rgba(39, 48, 58, 0.23),
        0 24px 45px rgba(20, 26, 33, 0.4),
        0 8px 16px rgba(20, 26, 33, 0.2);
      overflow: hidden;
      isolation: isolate;
    }

    .clock::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0));
      pointer-events: none;
      z-index: 2;
    }

    .brand,
    .date {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      letter-spacing: 0.06em;
      z-index: 5;
      user-select: none;
    }

    .brand {
      top: 31%;
      font-size: clamp(0.7rem, 1.9vmin, 0.85rem);
      font-weight: 600;
    }

    .date {
      top: 60%;
      font-size: clamp(0.62rem, 1.75vmin, 0.8rem);
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      background: linear-gradient(145deg, #f3f6f9, #dde3ea);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.7),
        inset 0 -2px 4px rgba(79, 89, 99, 0.2);
    }

    .markers {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .tick,
    .number {
      position: absolute;
      left: 50%;
      top: 50%;
      user-select: none;
      pointer-events: none;
    }

    .tick {
      width: 2px;
      height: 12px;
      border-radius: 999px;
      background: rgba(41, 49, 59, 0.62);
      box-shadow: 0 0 1px rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
    }

    .tick.major {
      background: rgba(23, 29, 36, 0.82);
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.18);
    }

    .number {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      z-index: 4;
    }

    .number span {
      font-size: clamp(0.95rem, 3.4vmin, 1.45rem);
      font-weight: 600;
      line-height: 1;
      color: #242b33;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.7),
        0 2px 3px rgba(0, 0, 0, 0.1);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(0deg);
      border-radius: 999px;
      z-index: 6;
      will-change: transform;
    }

    .hour {
      width: 9px;
      height: 27%;
      background: linear-gradient(to right, #2b3138, #58616d 45%, #242a31);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
    }

    .minute {
      width: 6px;
      height: 36%;
      background: linear-gradient(to right, #353c45, #6f7885 45%, #2c333b);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
    }

    .second {
      width: 2px;
      height: 42%;
      background: linear-gradient(to bottom, #ef5350, #b71c1c);
      box-shadow: 0 0 8px rgba(198, 40, 40, 0.35);
    }

    .second::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14%;
      width: 10px;
      height: 10px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #d32f2f;
    }

    .center-cap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 8;
      background:
        radial-gradient(circle at 35% 35%, #ffffff 0%, #eef2f7 30%, #9099a4 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.7),
        0 2px 4px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 520px) {
      :root {
        --dial-size: min(88vmin, 360px);
      }

      .hour {
        width: 8px;
      }

      .minute {
        width: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="clock" aria-label="Real-time analog clock">
    <div class="brand">ANALOG CHRONO</div>
    <div class="date" id="dateLabel"></div>
    <div class="markers" id="markers"></div>

    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center-cap"></div>
  </div>

  <script>
    const clock = document.querySelector('.clock');
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const dateLabel = document.getElementById('dateLabel');
    const markers = document.getElementById('markers');

    function buildMarkers() {
      markers.textContent = '';
      const radius = clock.clientWidth / 2;
      const outerTickRadius = radius * 0.88;
      const numberRadius = radius * 0.74;

      for (let i = 0; i < 60; i += 1) {
        const major = i % 5 === 0;
        const tick = document.createElement('div');
        tick.className = `tick${major ? ' major' : ''}`;

        const angleDeg = i * 6;
        const angleRad = (angleDeg - 90) * Math.PI / 180;
        const length = major ? radius * 0.09 : radius * 0.055;
        const tickRadius = outerTickRadius - length / 2;
        const x = Math.cos(angleRad) * tickRadius;
        const y = Math.sin(angleRad) * tickRadius;

        tick.style.width = `${major ? 3 : 2}px`;
        tick.style.height = `${length}px`;
        tick.style.left = `calc(50% + ${x}px)`;
        tick.style.top = `calc(50% + ${y}px)`;
        tick.style.transform = `translate(-50%, -50%) rotate(${angleDeg}deg)`;
        markers.appendChild(tick);
      }

      for (let n = 1; n <= 12; n += 1) {
        const number = document.createElement('div');
        number.className = 'number';

        const angleRad = (n * 30 - 90) * Math.PI / 180;
        const x = Math.cos(angleRad) * numberRadius;
        const y = Math.sin(angleRad) * numberRadius;

        number.style.left = `calc(50% + ${x}px)`;
        number.style.top = `calc(50% + ${y}px)`;

        const span = document.createElement('span');
        span.textContent = n;
        number.appendChild(span);
        markers.appendChild(number);
      }
    }

    function setRotation(element, deg) {
      element.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }

    function updateClock() {
      const now = new Date();
      const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
      const minutes = now.getMinutes() + seconds / 60;
      const hours = (now.getHours() % 12) + minutes / 60;

      setRotation(secondHand, seconds * 6);
      setRotation(minuteHand, minutes * 6);
      setRotation(hourHand, hours * 30);

      dateLabel.textContent = now.toLocaleDateString(undefined, {
        weekday: 'short',
        day: '2-digit',
        month: 'short'
      });

      requestAnimationFrame(updateClock);
    }

    buildMarkers();
    updateClock();

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(buildMarkers, 80);
    });
  </script>
</body>
</html>
